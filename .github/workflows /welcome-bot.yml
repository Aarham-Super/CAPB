name: CAPB Welcome Bot
on:
  pull_request:
    types: [opened]

jobs:
  welcome-comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post Welcome Message
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Hello! I am captcha-both bot. 

              ### ⚖️ Legal & Privacy
              By making this PR, you agree to our **Terms of Use** and **Privacy Policy**. Please stay professional.

              ### 💡 Recommendations
              - Do NOT submit in your own name; keep it as the original.
              - If the name is changed, your PR will be **cancelled**.

              ### 🎖️ Applying for Membership
              If you want to join the team, you must follow these naming rules:
              
              1. **The File Name:** You must create a new file and name it \`FIRSTNAME_MEMBERSHIP_FORM.md\`.
              2. **First Name Only:** Replace "FIRSTNAME" with your **first name only**. Do NOT include your middle or last name.
              3. **Requirements:** You MUST provide an Email or Phone Number inside the file.
              4. **PIN IT:** You must attach/pin your completed form to this PR. 
              
              **⚠️ WARNING:** If you use your full name in the filename, or if I cannot see your pinned attachment, this PR will be **closed**.

              *Please wait—our team is small! It may take days or weeks.*`
            })
